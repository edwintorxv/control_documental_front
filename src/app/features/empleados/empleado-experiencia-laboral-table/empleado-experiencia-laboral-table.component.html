<p-card header="Experiencia laboral del empleado">
    <div class="table-header">
        <p-button label="Crear experiencia laboral" icon="pi pi-plus" (click)="openCreateDialog()"></p-button>
        <!-- Búsqueda (pendiente) -->
        <div class="search-container">
            <input type="text" pInputText placeholder="Buscar empresa..." />
            <p-button icon="pi pi-search"></p-button>
            <p-button icon="pi pi-filter-slash" severity="secondary"></p-button>
        </div>
    </div>

    <p-table [value]="empleadoExperienciaLaboral" #dt1 dataKey="id" [tableStyle]="{ 'min-width': '75rem' }" [rows]="10"
        [paginator]="true" [scrollable]="true" scrollHeight="450px">
        <ng-template #header pTemplate="header">
            <tr>
                <th pSortableColumn="nombreEmpresa">Nombre empresa <p-sortIcon field="nombreEmpresa" /></th>
                <th pSortableColumn="direccionEpresa">Direccion <p-sortIcon field="direccioEmpresa" /></th>
                <th pSortableColumn="telefono">Telefono <p-sortIcon field="telefono" />
                </th>
                <th pSortableColumn="nombreJefeDirecto">Nombre Jefe directo <p-sortIcon field="nombreJefeDirecto" />
                </th>
                <th pSortableColumn="cargoDesempenio">Cargo desempañado<p-sortIcon field="cargoDesempenio" /></th>
                <th pSortableColumn="fechaIngreso">Fecha ingreso <p-sortIcon field="fechaIngreso" /></th>
                <th pSortableColumn="fechaRetiro">Fecha retiro <p-sortIcon field="fechaRetiro" /></th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-laboral>
            <tr>
                <td>{{laboral.nombreEmpresa}}</td>
                <td>{{laboral.direccionEmpresa}}</td>
                <td>{{laboral.telefono}}</td>
                <td>{{laboral.nombreJefeDirecto}}</td>
                <td>{{laboral.cargoDesempenio}}</td>
                <td>{{laboral.fechaIngreso}}</td>
                <td>{{laboral.fechaRetiro}}</td>
                <td>
                    <p-button icon="pi pi-pencil" class="p-button-rounded p-button-text"
                        (click)="openEditDialog(laboral)" severity="info"></p-button>

                    <p-button icon="pi pi-trash" class="p-button-rounded" (click)="confirmDelete(laboral)"
                        severity="danger"></p-button>

                </td>
            </tr>
        </ng-template>
    </p-table>

    <p-button label="Volver" icon="pi pi-arrow-left" (click)="volver()"></p-button>
    <p-confirmDialog></p-confirmDialog>

</p-card>

<p-dialog [header]="laboralEdit ? 'Editar Experiencia laboral' : 'Nueva experiencia laboral'"
    [(visible)]="displayDialog" [modal]="true" [style]="{ width: '50rem' }" (onHide)="onDialogHide()">
    <app-empleado-experiencia-laboral-dialog [empleadoId]="empleadoId" [experienciaLaboral]="laboralEdit"
        (saved)="onSaved($event)" (cancelled)="onCancelled()">
    </app-empleado-experiencia-laboral-dialog> <!--  -->
</p-dialog>

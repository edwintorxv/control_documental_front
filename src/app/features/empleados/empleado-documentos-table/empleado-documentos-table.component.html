<p-card header="Documentos del empleado">

    <div class="table-header">
        <p-button label="Crear documento" icon="pi pi-plus" (click)="openCreateDialog()"></p-button> <!--  -->
    </div>

    <p-table [value]="empleadoDocumento" #dt1 dataKey="id" [tableStyle]="{ 'min-width': '75rem' }" [rows]="10"
        [paginator]="true" [scrollable]="true" scrollHeight="450px">

        <ng-template #header pTemplate="header">
            <tr>
                <th pSortableColumn="nombre">Tipo documento <p-sortIcon field="nombre" /></th>
                <th pSortableColumn="apellido">Nombre archivo <p-sortIcon field="apellido" /></th>
                <th pSortableColumn="documentoMaestro.nombre">Fecha inicial <p-sortIcon
                        field="documentoMaestro.nombre" /></th>
                <th pSortableColumn="numeroIdentificacion">Fecha vencimiento <p-sortIcon field="numeroIdentificacion" />
                </th>
                <th>Ver archivo</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-documento>
            <tr>
                <td>{{documento.documentoMaestro?.nombre}}</td>
                <td>{{documento.nombreArchivo}}</td>
                <td>{{documento.fechaInicial}}</td>
                <td>{{documento.fechaFinal}}</td>
                <td>
                <button
                    pButton
                    icon="pi pi-eye"
                    (click)="verDocumento(documento)">
                </button>
            </td>
                <td>
                    <p-button icon="pi pi-trash" class="p-button-rounded" (click)="confirmDelete(documento)"
                        severity="danger"></p-button>
                </td>
            </tr>
        </ng-template>

    </p-table>
    <p-button label="Volver" icon="pi pi-arrow-left" (click)="volver()"></p-button>
    <p-confirmDialog></p-confirmDialog>

</p-card>

<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{ width: '50rem' }">
    <!-- (onHide)="onDialogHide()" -->
    <app-empleado-documentos-dialog (saved)="onSaved($event)" [empleadoId]="empleadoId" (cancelled)="onCancelled()">
        <!--  [experienciaLaboral]="laboralEdit" -->
    </app-empleado-documentos-dialog> <!--  -->
</p-dialog>

<p-dialog header="Visor de documento" [(visible)]="visiblePdf" [modal]="true" [style]="{width:'70vw', height: '450px'}"
    [breakpoints]="{'960px':'90vw'}">

    <app-pdf-viewer [src]="rutaPdf" height="80vh">
    </app-pdf-viewer>

</p-dialog>
<p>empleado-documentos-table works!</p>
